<!-- PAGE TITLE -->

<div class="container mt-5">

<h1 class="text-center mb-3">
Room Booking
</h1>

<p class="text-center">
Reserve your stay with us.
</p>

</div>

<!-- BOOKING FORM -->

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-dark text-white text-center">

<h3>Booking Form</h3>

</div>

<div class="card-body">

<form>

<div class="mb-3">

<label class="form-label">
Customer Name
</label>

<input type="text" class="form-control" placeholder="Enter Your Name">

</div>

<div class="mb-3">

<label class="form-label">
Mobile Number
</label>

<input type="tel" class="form-control" placeholder="Enter Mobile Number">

</div>

<div class="mb-3">

<label class="form-label">
Email Address
</label>

<input type="email" class="form-control" placeholder="Enter Email">

</div>

<div class="mb-3">

<label class="form-label">
Room Type
</label>

<select class="form-select">

<option>Select Room</option>

<option>Deluxe Room</option>

<option>Executive Room</option>

<option>Suite Room</option>

</select>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Check In Date
</label>

<input type="date" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Check Out Date
</label>

<input type="date" class="form-control">

</div>

</div>

<div class="mb-3">

<label class="form-label">
Number of Guests
</label>

<input type="number" class="form-control" placeholder="Enter Number of Guests">

</div>

<div class="mb-3">

<label class="form-label">
Special Request
</label>

<textarea class="form-control" rows="4"></textarea>

</div>

<div class="text-center">

<button type="submit" class="btn btn-primary">
Book Now
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<!-- BOOKING INFO -->

<div class="container mt-5">

<h2 class="text-center mb-4">
Why Book With Us?
</h2>

<div class="row">

<div class="col-md-4">

<div class="card shadow text-center mb-3">

<div class="card-body">

<h4>Luxury Rooms</h4>

<p>Comfortable and modern rooms.</p>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow text-center mb-3">

<div class="card-body">

<h4>Best Prices</h4>

<p>Affordable luxury stays.</p>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow text-center mb-3">

<div class="card-body">

<h4>24×7 Service</h4>

<p>Always available for guests.</p>

</div>

</div>

</div>

</div>

</div>
